<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Mart login page using Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="left-section">
              <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSJdZsvFkjmsOBsKHfTCTju4c4kvp9PsgQ2K9HcMB4jSA&s=10" alt="washing machine illustration">
        </div>
        <div class="right-section">

            <div class="form-container" style="width: 100%;">
                <h1>Hello Again!</h1>
                <p class="subtitle">Welcome back!we missed you!</p>

                <form action="#">
                    <div class="input">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Emailid@site.com" required>
                    </div>

                    <div class="input">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>

                    <div class="forgot-pass">
                        <a href="#">Forgot Password</a>
                    </div>
                    
                    <button>Login</button>
                </form>
                <p class="register-link">Not a member? <a href="#">Register Now</a></p>
            </div>
        </div>
    </div>
    
</body>
</html>
